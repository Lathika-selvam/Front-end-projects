<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucky Number Challenge</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
        background-size: 400% 400%;
        animation: bgAnimation 12s ease infinite;
      }

      @keyframes bgAnimation {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(white 2px, transparent 2px);
        background-size: 60px 60px;
        opacity: 0.3;
        animation: moveStars 25s linear infinite;
      }

      @keyframes moveStars {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-300px);
        }
      }

      .container {
        width: 430px;
        padding: 35px;
        border-radius: 20px;
        text-align: center;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px);
        color: white;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        z-index: 1;
      }

      h1 {
        margin-bottom: 15px;
      }

      p {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 15px;
        border: none;
        outline: none;
        border-radius: 10px;
        font-size: 18px;
        text-align: center;
      }

      button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        background: #ff9800;
        color: white;
        font-size: 18px;
        transition: 0.5s;
      }

      button:hover {
        transform: scale(1.08);
        background: #ff5722;
      }

      .reset {
        background: #3949ab;
        margin-left: 10px;
      }

      .reset:hover {
        background: #1a237e;
      }

      .loader {
        margin: 20px auto;
        width: 45px;
        height: 45px;
        border: 5px solid white;
        border-top: 5px solid orange;
        border-radius: 50%;
        display: none;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      #result {
        margin-top: 20px;
        min-height: 70px;
        font-size: 24px;
        font-weight: bold;
      }

      .win {
        color: yellow;
        animation: zoom 0.6s infinite alternate;
      }

      .lose {
        color: #ffd4d4;
      }

      @keyframes zoom {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.15);
        }
      }

      #attempts {
        margin-top: 15px;
        font-size: 18px;
      }

      #quote {
        margin-top: 15px;
        font-style: italic;
      }

    </style>
  </head>

  <body>
    <div class="stars"></div>

    <div class="container">
      <h1>🧩 Lucky Number Challenge 🧩c</h1>

      <p>Enter your lucky number and see if destiny chooses you today!</p>

      <input type="number" id="number" placeholder="Enter a Number" />

      <br />

      <button onclick="startCheck()">Check Luck</button>

      <button class="reset" onclick="resetGame()">Reset</button>

      <div class="loader" id="loader"></div>

      <h2 id="result"></h2>

      <div id="attempts">Attempts : 0</div>

      <div id="quote"></div>
    </div>

    <script>
      const luckyNumber = 5;

      let attempts = 0;

      const quotes = [
        "🍀 Luck is believing you're lucky.",
        "✨ Every try is a step toward success.",
        "🌈 Keep believing in yourself.",
        "💙 Great things take time.",
        "⭐ Fortune favors the brave.",
      ];

      const input = document.getElementById("number");
      const result = document.getElementById("result");
      const loader = document.getElementById("loader");
      const attemptsText = document.getElementById("attempts");
      const quote = document.getElementById("quote");

      input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          startCheck();
        }
      });

      function startCheck() {
        if (input.value == "") {
          result.innerHTML = "⚠ Please enter a number.";
          result.className = "lose";
          return;
        }

        loader.style.display = "block";
        result.innerHTML = "";

        setTimeout(checkLucky, 2000);
      }

      function checkLucky() {
        loader.style.display = "none";

        attempts++;

        attemptsText.innerHTML = "Attempts : " + attempts;

        let userNumber = Number(input.value);

        quote.innerHTML = quotes[Math.floor(Math.random() * quotes.length)];

        if (userNumber === luckyNumber) {
          result.innerHTML =
            "🎉 Congratulations!<br>You Found the Lucky Number!😊";
          result.className = "win";
        } else {
          result.innerHTML = "😔 Better Luck Next Time!";
          result.className = "lose";
        }
      }

      function resetGame() {
        input.value = "";
        result.innerHTML = "";
        quote.innerHTML = "";
        attempts = 0;
        attemptsText.innerHTML = "Attempts : 0";
      }
    </script>
  </body>
</html>
