<!DOCTYPE html>
<html>
<head>
    <title>Mini Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8f0fe;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .calculator {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 2px 2px 10px gray;
        }

        h2 {
            text-align: center;
            color: white;
        }

        #display {
            width: 100%;
            height: 45px;
            margin-bottom: 15px;
            font-size: 20px;
            text-align: right;
            border: none;
            border-radius: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }


        .num {
            background-color: #3498db;
            color: white;
        }

        .op {
            background-color: #f39c12;
            color: white;
        }
        .equal {
            background-color: #a5ae27;
            color: white;
        }

        .clear {
            background-color: #72e73c;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="calculator">
    <h2>Calculator</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="num" onclick="addValue('7')">7</button>
        <button class="num" onclick="addValue('8')">8</button>
        <button class="num" onclick="addValue('9')">9</button>
        <button class="op" onclick="addValue('/')">/</button>

        <button class="num" onclick="addValue('4')">4</button>
        <button class="num" onclick="addValue('5')">5</button>
        <button class="num" onclick="addValue('6')">6</button>
        <button class="op" onclick="addValue('*')">*</button>

        <button class="num" onclick="addValue('1')">1</button>
        <button class="num" onclick="addValue('2')">2</button>
        <button class="num" onclick="addValue('3')">3</button>
        <button class="op" onclick="addValue('-')">-</button>

        <button class="num" onclick="addValue('0')">0</button>
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="op" onclick="addValue('+')">+</button>
    </div>
</div>

<script>
    function addValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        let result = document.getElementById("display").value;

        try {
            document.getElementById("display").value = eval(result);
        } catch {
            document.getElementById("display").value = "Error";
        }
    }
</script>

</body>
</html>
