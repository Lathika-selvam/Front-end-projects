<!doctype html>
<html>
<head>

<title>Online Learning Login</title>

<style>

body {

    font-family: Arial, sans-serif;
    background-color: #f3f7fb;
    padding: 20px;

}

.login-box {

    width: 380px;
    margin: auto;
    background-color: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px #ccc;

}

h1 {

    text-align: center;
    color: #1d3557;

}

.subtitle {

    text-align: center;
    color: gray;
    margin-bottom: 20px;

}

label {

    font-weight: bold;

}

input {

    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid gray;
    border-radius:5px;

}

button {

    width:100%;
    padding:10px;
    background-color:#457b9d;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;

}

button:hover {

    background-color:#1d3557;

}

a {

    color:#457b9d;
    text-decoration:none;

}

p {

    text-align:center;

}

</style>

</head>

<body>

<div class="login-box">

<h1>Student Login</h1>

<p class="subtitle">
Login to access your courses and learning dashboard
</p>

<form>

<label>Email</label>

<input type="email" placeholder="Enter your email" required>

<label>Password</label>

<input type="password"placeholder="Enter your password "required>


<button type="submit">

Login

</button>

<p>

<a href="#">
Forgot Password?

</a>

</p>

<p>

Don't have an account?

<a href="#">
Register

</a>

</p>

</form>

</div>

</body>
</html>
